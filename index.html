      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      ::-webkit-scrollbar-thumb { background: #2d5a2d; border-radius: 3px; }
      select option { background: #1a2e1a; }
      button:focus, select:focus, input:focus { outline: none; }
